name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # Sesuaikan jika branch utama anda 'main'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Folder hasil build vite
          branch: gh-pages # Branch tujuan untuk hosting
